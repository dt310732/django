# docker-compose.yml

services:
  postgres:
    image: postgres:16
    container_name: django_learning_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: django_learning
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: